---
- summary: | 
    Проверка поиска товара по существующему ключевому слову
  requirement: | 
    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: | 
    Открыта главная страница магазина
  test-data: | 
    Ключевое слово = Essence
  steps:
    - Ввести в поле поиска существующее название товара ("Essence")
    - Нажать кнопку поиска
  expected-result: | 
    Отображаются результаты поиска: на странице выводится как минимум один товар, содержащий слово "Essence" в названии
- summary: | 
    Проверка поиска товара по несуществующему ключевому слову
  requirement: | 
    При поиске по несуществующему ключевому слову пользователь должен увидеть сообщение об отсутствии товаров
  prerequisites: | 
    Открыта главная страница магазина
  test-data: | 
    Ключевое слово = qwerty123
  steps:
    - Ввести в поле поиска несуществующее название товара ("qwerty123")
    - Нажать кнопку поиска
  expected-result: | 
    Отображается сообщение о том, что товары не найдены, и список товаров не отображается
- summary: | 
    Проверка фильтрации товаров по категории "beauty"
  requirement: | 
    Пользователь должен иметь возможность фильтровать товары по категории
  prerequisites: | 
    Открыта главная страница магазина
  test-data: | 
    Категория = beauty
  steps:
    - Нажать на выпадающий список категорий и выбрать категорию "beauty"
  expected-result: | 
    Отображаются только товары из категории "beauty". Название категории указано на странице каталога
- summary: | 
    Проверка перехода на вторую страницу каталога товаров
  requirement: | 
    Пользователь должен иметь возможность пользоваться постраничным выводом товаров
  prerequisites: | 
    Открыта главная страница магазина
  test-data: | 
    Страница = 2
  steps:
    - Нажать на кнопку перехода на вторую страницу каталога (например, «2» или «Next»)
  expected-result: | 
    Отображаются товары со второй страницы каталога: список товаров отличается от первой страницы
- summary: | 
    Просмотр детальной информации о товаре из каталога
  requirement: | 
    Пользователь должен иметь возможность просматривать подробную информацию о товаре
  prerequisites: | 
    Открыта главная страница магазина
  test-data: | 
    Товар = Essence Mascara Lash Princess
  steps:
    - Найти в каталоге товар "Essence Mascara Lash Princess" и кликнуть на его название или изображение
  expected-result: | 
    Открывается страница товара "Essence Mascara Lash Princess". На странице отображаются название товара, рейтинг, цена без скидки и цена со скидкой, а также описание товара
- summary: | 
    Добавление товара в корзину с детальной страницы товара
  requirement: | 
    Пользователь должен иметь возможность добавлять товары в корзину
  prerequisites: | 
    Открыта страница товара "Essence Mascara Lash Princess"
  test-data: | 
    Товар = Essence Mascara Lash Princess
  steps:
    - На странице товара нажать кнопку "Добавить в корзину"
  expected-result: | 
    Товар добавляется в корзину. Иконка корзины (или счетчик товаров) отображает обновленное количество товаров
- summary: | 
    Удаление товара из корзины
  requirement: | 
    Пользователь должен иметь возможность удалять товары из корзины
  prerequisites: | 
    Товар "Essence Mascara Lash Princess" добавлен в корзину
  test-data: | 
    Товар = Essence Mascara Lash Princess
  steps:
    - Открыть страницу корзины (нажать на иконку корзины)
    - Нажать кнопку удаления товара "Essence Mascara Lash Princess"
  expected-result: | 
    Товар удаляется из корзины. В корзине не остается товаров, отображается сообщение о том, что корзина пуста
- summary: | 
    Оформление заказа при наличии товаров в корзине
  requirement: | 
    Пользователь должен иметь возможность оформить заказ при условии, что корзина не пуста
  prerequisites: | 
    Товар "Essence Mascara Lash Princess" добавлен в корзину
  test-data: 
  steps:
    - Открыть страницу корзины
    - Нажать кнопку "Оформить заказ"
  expected-result: | 
    Пользователь перенаправляется на страницу оплаты заказа
- summary: | 
    Попытка оформления заказа с пустой корзиной
  requirement: | 
    Пользователь не должен иметь возможность оформить заказ при пустой корзине
  prerequisites: | 
    Открыта страница корзины без добавленных товаров
  test-data: 
  steps:
    - Убедиться, что корзина пуста (нет товаров)
    - Нажать кнопку "Оформить заказ"
  expected-result: | 
    Отображается сообщение об ошибке или предупреждение о том, что оформить заказ невозможно (например, кнопка "Оформить заказ" недоступна)
- summary: | 
    Переключение языка интерфейса на русский
  requirement: | 
    Пользователь должен иметь возможность переключать язык интерфейса приложения
  prerequisites: | 
    Открыта главная страница магазина (на английском языке)
  test-data: 
  steps:
    - Нажать на переключатель языка и выбрать русский язык (RU)
  expected-result: | 
    Интерфейс приложения переключается на русский язык (текст интерфейса отображается на русском, включая кнопки и заголовки)
- summary: | 
    Сохранение корзины после перезагрузки страницы
  requirement: | 
    Корзина должна сохраняться в сессии браузера
  prerequisites: | 
    Товар "Essence Mascara Lash Princess" добавлен в корзину
  test-data: 
  steps:
    - Обновить или перезагрузить страницу браузера
  expected-result: | 
    Содержимое корзины сохраняется после перезагрузки страницы (товар остается в корзине)
