---
- summary: |
    Проверка отображения списка товаров в каталоге
  requirement: |
    Пользователь должен иметь возможность просматривать каталог товаров
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Поле поиска пустое
  steps:
    - Перейти на главную страницу магазина
    - Проверить список товаров в каталоге
  expected-result: |
    Отображается список товаров.
    Для каждого товара отображаются:
    - название
    - рейтинг
    - цена без скидки
    - цена со скидкой

- summary: |
    Проверка поиска товара по существующему ключевому слову
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Ключевое слово = Essence
  steps:
    - Ввести в поле поиска существующее название товара "Essence"
  expected-result: |
    Отображаются результаты поиска: на странице выводится как минимум один товар, содержащий слово "Essence" в названии

- summary: |
    Проверка поиска товара по несуществующему ключевому слову
  requirement: |
    При поиске по несуществующему ключевому слову пользователь должен увидеть сообщение об отсутствии товаров
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Ключевое слово = qwerty123
  steps:
    - Ввести в поле поиска несуществующее название товара "qwerty123"
  expected-result: |
    Отображается сообщение о том, что товары не найдены, и список товаров не отображается

- summary: |
    Проверка поиска товара по пустому значению
  requirement: |
    Поиск должен корректно обрабатывать пустое значение
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Поле поиска пустое
  steps:
    - Очистить поле поиска
  expected-result: |
    Отображается полный список товаров каталога без фильтрации

- summary: |
    Проверка фильтрации товаров по категории "beauty"
  requirement: |
    Пользователь должен иметь возможность фильтровать товары по категории
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Категория = beauty
  steps:
    - Нажать на выпадающий список категорий
    - Выбрать категорию "beauty"
  expected-result: |
    Отображаются только товары из категории "beauty"

- summary: |
    Проверка фильтрации товаров по бренду
  requirement: |
    Пользователь должен иметь возможность фильтровать товары по бренду
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Brand = Essence
  steps:
    - Открыть блок фильтрации бренда
    - Выбрать бренд "Essence"
  expected-result: |
    Отображаются только товары выбранного бренда

- summary: |
    Проверка фильтрации товаров по цене
  requirement: |
    Пользователь должен иметь возможность фильтровать товары по цене
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Цена от = 10
    Цена до = 50
  steps:
    - Ввести значение минимальной цены "10"
    - Ввести значение максимальной цены "50"
  expected-result: |
    В каталоге отображаются только товары, цена которых попадает в диапазон от 10 до 50

- summary: |
    Проверка фильтрации товаров по наличию
  requirement: |
    Пользователь должен иметь возможность фильтровать товары по наличию
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    In stock = true
  steps:
    - Установить фильтр "In stock"
  expected-result: |
    В каталоге отображаются только товары, которые есть в наличии

- summary: |
    Проверка перехода на вторую страницу каталога товаров
  requirement: |
    Пользователь должен иметь возможность пользоваться постраничным выводом товаров
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Переход на страницу 2
  steps:
    - Нажать на кнопку перехода на вторую страницу каталога "Next"
  expected-result: |
    Отображаются товары со второй страницы каталога, список товаров отличается от первой страницы

- summary: |
    Просмотр детальной информации о товаре из каталога
  requirement: |
    Пользователь должен иметь возможность просматривать подробную информацию о товаре
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Товар = Essence Mascara Lash Princess
  steps:
    - Найти в каталоге товар "Essence Mascara Lash Princess"
    - Нажать на картинку товара
  expected-result: |
    Открывается страница товара "Essence Mascara Lash Princess".
    На странице отображаются:
    - название товара
    - рейтинг
    - цена без скидки
    - цена со скидкой
    - описание товара

- summary: |
    Переход в категорию товара по хэштегу на странице товара
  requirement: |
    Пользователь должен иметь возможность перейти в категорию товара со страницы товара
  prerequisites: |
    Открыта страница "Essence Mascara Lash Princess"
  test-data: |
    Хэштег = #beauty
  steps:
    - Открыть страницу любого товара
    - Нажать на хэштег категории товара
  expected-result: |
    Открывается каталог товаров с фильтрацией по выбранной категории

- summary: |
    Добавление товара в корзину с детальной страницы товара
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину
  prerequisites: |
    Открыта страница товара "Essence Mascara Lash Princess"
  test-data: |
    Товар = Essence Mascara Lash Princess
  steps:
    - Нажать кнопку "Add to cart"
  expected-result: |
    Товар добавляется в корзину, счетчик товаров в корзине увеличивается

- summary: |
    Добавление двух разных товаров в корзину
  requirement: |
    Пользователь должен иметь возможность добавлять несколько товаров в корзину
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Товар 1 = Essence Mascara Lash Princess
    Товар 2 = Apple
  steps:
    - Добавить первый товар в корзину
    - Добавить второй товар в корзину
    - Перейти в корзину
  expected-result: |
    В корзине отображаются два разных товара

- summary: |
    Добавление одного и того же товара в корзину несколько раз
  requirement: |
    Пользователь должен иметь возможность добавлять один и тот же товар в корзину
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Товар = Essence Mascara Lash Princess
    Количество = 2
  steps:
    - Добавить товар в корзину
    - Добавить этот же товар в корзину повторно
    - Перейти в корзину
  expected-result: |
    В корзине отображается один товар с количеством 2

- summary: |
    Удаление товара из корзины
  requirement: |
    Пользователь должен иметь возможность удалять товары из корзины
  prerequisites: |
    Товар добавлен в корзину
  test-data: |
    Товар = Essence Mascara Lash Princess
  steps:
    - Открыть страницу корзины
    - Нажать кнопку удаления товара
  expected-result: |
    Товар удаляется из корзины, корзина становится пустой

- summary: |
    Очистка корзины целиком
  requirement: |
    Пользователь должен иметь возможность удалить все товары из корзины
  prerequisites: |
    В корзине есть два товара
  test-data: |
    Товар 1 = Essence Mascara Lash Princess
    Товар 2 = Apple
  steps:
    - Перейти в корзину
    - Нажать кнопку очистки корзины
  expected-result: |
    Корзина становится пустой и отображается соответствующее сообщение

- summary: |
    Оформление заказа при наличии товаров в корзине
  requirement: |
    Пользователь должен иметь возможность оформить заказ при условии, что корзина не пуста
  prerequisites: |
    В корзине есть товар
  test-data: |
    Корзина содержит минимум 1 товар
  steps:
    - Открыть страницу корзины
    - Нажать кнопку "Checkout"
  expected-result: |
    Отображается сообщение об успешном оформлении заказа

- summary: |
    Переход на страницу оплаты после оформления заказа
  requirement: |
    Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  prerequisites: |
    В корзину добавлен минимум один товар
  test-data: |
    Товар "Essence Mascara Lash Princess" добавлен в корзину
  steps:
    - Открыть страницу корзины
    - Нажать кнопку "Checkout"
  expected-result: |
    Пользователь перенаправляется на страницу оплаты.
    В адресной строке отображается URL страницы оплаты.
    Отображается форма оплаты или экран подтверждения оплаты заказа.

- summary: |
    Закрытие окна успешного оформления заказа через кнопку закрытия (X)
  requirement: |
    Пользователь должен иметь возможность закрыть окно успешного оформления заказа
  prerequisites: |
    В корзину добавлен минимум один товар
  test-data: |
    Товар "Essence Mascara Lash Princess" добавлен в корзину
  steps:
    - Открыть страницу корзины
    - Нажать кнопку "Checkout"
    - Нажать кнопку закрытия окна (X)
  expected-result: |
    Модальное окно закрывается.
    Пользователь остается на странице корзины.

- summary: |
    Закрытие окна успешного оформления заказа через кнопку закрытия (Close)
  requirement: |
    Пользователь должен иметь возможность закрыть окно успешного оформления заказа
  prerequisites: |
    В корзину добавлен минимум один товар
  test-data: |
    Товар "Essence Mascara Lash Princess" добавлен в корзину
  steps:
    - Открыть страницу корзины
    - Нажать кнопку "Checkout"
    - Нажать кнопку закрытия окна "Close"
  expected-result: |
    Модальное окно закрывается.
    Пользователь остается на странице корзины.

- summary: |
    Переключение языка интерфейса на русский и проверка локализации основных разделов
  requirement: |
    Пользователь должен иметь возможность переключить язык интерфейса
  prerequisites: |
    Открыта главная страница магазина на английском языке
  test-data: |
    Язык = RU
  steps:
    - Переключить язык интерфейса на русский
    - Перейти в каталог товаров
    - Открыть страницу любого товара
    - Перейти в корзину
  expected-result: |
    Основные элементы интерфейса отображаются на русском языке:
    - кнопки
    - заголовки
    - названия разделов
    - элементы корзины

- summary: |
    Переключение языка интерфейса на английский и проверка локализации основных разделов
  requirement: |
    Пользователь должен иметь возможность переключить язык интерфейса
  prerequisites: |
    Открыта главная страница магазина на русском языке
  test-data: |
    Язык = EN
  steps:
    - Переключить язык интерфейса на английский
    - Перейти в каталог товаров
    - Открыть страницу любого товара
    - Перейти в корзину
  expected-result: |
    Основные элементы интерфейса отображаются на английском языке:
    - кнопки
    - заголовки
    - названия разделов
    - элементы корзины

- summary: |
    Сохранение корзины после перезагрузки страницы
  requirement: |
    Корзина должна сохраняться в сессии браузера
  prerequisites: |
    Товар добавлен в корзину
  test-data: |
    Корзина содержит минимум 1 товар
  steps:
    - Перейти в корзину
    - Перезагрузить страницу браузера
  expected-result: |
    Содержимое корзины сохраняется после перезагрузки страницы

- summary: |
    Проверка отображения сайта в мобильном разрешении
  requirement: |
    Сайт должен иметь мобильную версию (адаптивная верстка)
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Разрешение экрана = 375x812
  steps:
    - Открыть DevTools
    - Включить режим адаптивного отображения
    - Установить разрешение 375x812
    - Проверить отображение каталога товаров и меню
  expected-result: |
    Страница отображается корректно:
    - элементы не наезжают друг на друга
    - текст читаемый
    - кнопки доступны для нажатия

- summary: |
    Проверка совместимости сайта в Google Chrome
  requirement: |
    Сайт должен быть протестирован на совместимость с последними версиями браузеров
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Браузер = Google Chrome
  steps:
    - Открыть сайт в Google Chrome
    - Выполнить базовый пользовательский сценарий (поиск, открытие товара, добавление в корзину)
  expected-result: |
    Сайт работает корректно, ошибки в консоли отсутствуют

- summary: |
    Проверка совместимости сайта в Mozilla Firefox
  requirement: |
    Сайт должен быть протестирован на совместимость с последними версиями браузеров
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Браузер = Mozilla Firefox
  steps:
    - Открыть сайт в Mozilla Firefox
    - Выполнить базовый пользовательский сценарий (поиск, открытие товара, добавление в корзину)
  expected-result: |
    Сайт работает корректно, ошибки в консоли отсутствуют

- summary: |
    Проверка отсутствия ошибок API-запросов при загрузке каталога товаров
  requirement: |
    Сайт должен быть оптимизирован для скорости работы и корректно обрабатывать запросы
  prerequisites: |
    Открыта главная страница магазина
  test-data: |
    Сайт доступен
  steps:
    - Открыть DevTools
    - Перейти во вкладку Network
    - Обновить страницу
    - Проверить статус запросов API
  expected-result: |
    Все запросы выполняются успешно (статус 200).
    Ошибки 4xx/5xx отсутствуют.

- summary: |
    Проверка отсутствия ошибок API-запросов при оформлении заказа
  requirement: |
    Сайт должен быть оптимизирован для скорости работы и корректно обрабатывать запросы
  prerequisites: |
    В корзине есть минимум один товар
  test-data: |
    Товар = Essence Mascara Lash Princess
  steps:
    - Открыть DevTools
    - Перейти во вкладку Network
    - Открыть страницу корзины
    - Убедиться, что товар отображается в корзине
    - Нажать кнопку "Checkout"
    - Дождаться появления модального окна успешного оформления заказа
    - Проверить статус запросов API 
  expected-result: |
    Отображается модальное окно с сообщением об успешном оформлении заказа.
    Запрос выполняется успешно (статус 200).
    Ошибки 4xx/5xx отсутствуют.
