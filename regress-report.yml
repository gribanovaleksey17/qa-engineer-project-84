bugreports:
  - summary: |
      При переключении языка на русский не меняются описания товаров, названия категорий и производителей
  environment: |
    Google Chrome 124.0.6344.93 (Официальная сборка) (64 бит)
    Ubuntu 22.04 x86_64
    Приложение: Hexlet Products Store v1
  steps-to-reproduce: |
    1. Открыть сайт магазина (https://products-store.hexlet.app/) в Chrome.
    2. Убедиться, что язык интерфейса – английский.
    3. Нажать на переключатель языка «RU» (русский) в правом верхнем углу.
    4. Перейти в каталог товаров и открыть страницу любого товара (например, Essence Mascara Lash Princess).
    5. Сравнить тексты описания товара, названия категории и производителя до и после переключения языка.
  expected-result: |
    После переключения на русский весь текст интерфейса должен отображаться на русском языке – включая описания товаров, названия категорий и производителей.
  actual-result: |
    Интерфейс меню поменялся на русский, но описания товаров, названия категорий и производителей остались на английском. Эти элементы не переведены и отображаются на исходном языке.
