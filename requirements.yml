---
functional:
  - Пользователь должен иметь возможность просматривать каталог товаров
  - Пользователь должен иметь возможность просматривать подробную информацию о товаре
  - На странице товара и в каталоге должно отображаться название товара
  - На странице товара и в каталоге должен отображаться рейтинг товара
  - На странице товара и в каталоге должна отображаться цена без скидки
  - На странице товара и в каталоге должна отображаться цена со скидкой
  - Пользователь должен иметь возможность искать товары по ключевому слову или категории
  - Пользователь должен иметь возможность фильтровать товары
  - Пользователь должен иметь возможность использовать постраничный вывод товаров
  - Пользователь должен иметь возможность добавлять товары в корзину
  - Пользователь должен иметь возможность просматривать содержимое корзины
  - Пользователь должен иметь возможность удалять товары из корзины
  - Пользователь должен иметь возможность продолжить выбирать товары после добавления в корзину
  - Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  - Пользователь должен иметь возможность переключить язык интерфейса
  - Сайт должен иметь локализацию на русский и английский языки

non-functional:
  - Сайт должен быть разработан с учетом удобства использования и оптимизирован для скорости работы
  - Сайт должен быть безопасным и защищать данные пользователя
  - Сайт должен иметь мобильную версию (адаптивная верстка)
  - Сайт должен быть SPA-приложением без перезагрузки страницы
  - Сайт должен быть протестирован на совместимость с последними версиями браузеров
  - Сайт должен быть доступен на различных устройствах
  - Сайт должен обрабатывать большое количество трафика
  - Сайт должен быть доступен без использования VPN (прямой доступ из сети Интернет)
  - Корзина должна храниться в сессии браузера

implicit:
  - Пользователь должен видеть сообщение, если по поиску или фильтрам товары не найдены
  - Фильтры и поиск должны применяться без ошибок и корректно обновлять список товаров
  - Добавленный в корзину товар должен сохраняться при переходах между страницами сайта
  - При обновлении страницы корзина должна сохраняться в пределах текущей сессии браузера
  - Пользователь не должен иметь возможность оформить заказ с пустой корзиной
  - При переключении языка должны переводиться все элементы интерфейса, включая кнопки и сообщения об ошибках
  - Система должна корректно обрабатывать ошибки сети и показывать пользователю сообщение об ошибке
  - Система должна предотвращать отображение некорректных цен (например, отрицательных значений)
