---
- summary: |
    При переключении языка на русский не меняются описания товаров, названия категорий и производителей
  environment: |
    Google Chrome 124.0.6344.93 (Официальная сборка) (64 бит)
    Ubuntu 22.04 x86_64
    Приложение: Hexlet Products Store v1
  steps-to-reproduce: |
    1. Открыть сайт магазина https://products-store.hexlet.app/.
    2. Убедиться, что язык интерфейса – английский.
    3. Нажать на переключатель языка «RU» (русский) в правом верхнем углу.
    4. Перейти в каталог товаров и открыть страницу любого товара (например, Essence Mascara Lash Princess).
    5. Сравнить тексты описания товара, названия категории и производителя до и после переключения языка.
  expected-result: |
    После переключения на русский весь текст интерфейса должен отображаться на русском языке – включая описания товаров, названия категорий и производителей.
  actual-result: |
    Интерфейс меню поменялся на русский, но описания товаров, названия категорий и производителей остались на английском. Эти элементы не переведены и отображаются на исходном языке.
    screenshot: assets/bugreports/image-bug-1.png.

- summary: |
    Не закрывается модальное окно успешного оформления заказа через кнопку (X)
  environment: |
    Google Chrome 124.0.6344.93 (64-bit)
    Ubuntu 22.04 x86_64
    https://products-store.hexlet.app/
  steps-to-reproduce: |
    1. Открыть сайт https://products-store.hexlet.app/
    2. Добавить товар "Essence Mascara Lash Princess" в корзину
    3. Перейти в корзину
    4. Нажать кнопку "Checkout"
    5. В появившемся модальном окне нажать на кнопку закрытия (X) в правом верхнем углу
  expected-result: |
    Модальное окно закрывается.
    Пользователь остается на странице корзины.
  actual-result: |
    Модальное окно не закрывается.
    Нажатие на кнопку (X) не приводит к закрытию окна.
    screenshot: assets/bugreports/image-bug-2.png.

- summary: |
    После оформления заказа отсутствует переход на страницу оплаты
  environment: |
    Google Chrome 124.0.6344.93 (Официальная сборка) (64 бит)
    Ubuntu 22.04 x86_64
    Приложение: Hexlet Products Store v1
  steps-to-reproduce: |
    1. Открыть сайт магазина https://products-store.hexlet.app/
    2. Добавить товар "Essence Mascara Lash Princess" в корзину
    3. Перейти в корзину
    4. Нажать кнопку "Оформить заказ"
  expected-result: |
    Пользователь перенаправляется на страницу оплаты заказа.
    В браузере открывается форма оплаты.
  actual-result: |
    Отображается модальное окно с сообщением об успешном оформлении заказа.
    Переход на страницу оплаты не выполняется.

- summary: |
    Не работает переход в категорию товара по хэштегу на странице товара
  environment: |
    Google Chrome 124.0.6344.93 (64-bit)
    Ubuntu 22.04 x86_64
    https://products-store.hexlet.app/
  steps-to-reproduce: |
    1. Открыть сайт https://products-store.hexlet.app/
    2. Открыть страницу товара "Essence Mascara Lash Princess" из каталога
    3. Нажать на хэштег категории #beauty
  expected-result: |
    Пользователь перенаправляется в каталог товаров.
    В каталоге автоматически применяется фильтр выбранной категории.
    Отображаются товары выбранной категории.
  actual-result: |
    При нажатии на хэштег ничего не происходит.
    Переход в каталог и фильтрация по категории не выполняются.

- summary: |
    Некорректное отображение интерфейса в мобильном разрешении (отсутствует адаптивная верстка)
  environment: |
    Google Chrome 124.0.6344.93 (64-bit)
    Ubuntu 22.04 x86_64
    DevTools Device Mode: iPhone 12 / 390x844
    https://products-store.hexlet.app/
  steps-to-reproduce: |
    1. Открыть сайт https://products-store.hexlet.app/
    2. Открыть DevTools
    3. Переключиться в режим мобильного устройства (Device Toolbar)
    4. Выбрать разрешение iPhone 12 (390x844)
    5. Проверить отображение каталога товаров и элементов интерфейса
  expected-result: |
    Интерфейс корректно адаптируется под мобильное разрешение:
    - карточки товаров не выходят за границы экрана
    - элементы не перекрывают друг друга
    - меню и кнопки доступны для нажатия
    - отсутствует горизонтальная прокрутка
  actual-result: |
    Интерфейс отображается некорректно:
    - элементы выходят перекрываются
    - часть элементов интерфейса неудобна для использования

- summary: |
    Переход на страницу товара происходит при клике на текст описания, а не только по изображению товара
  environment: |
    Google Chrome 124.0.6344.93 (64-bit)
    Ubuntu 22.04 x86_64
    https://products-store.hexlet.app/
  steps-to-reproduce: |
    1. Открыть сайт https://products-store.hexlet.app/
    2. В каталоге товаров найти карточку товара "Essence Mascara Lash Princess"
    3. Нажать на текстовое описание товара, НЕ нажимая на изображение товара
  expected-result: |
    Переход на страницу товара выполняется только при клике на изображение товара.
    При клике на текст карточки переход не происходит, текст можно выделять мышью.
  actual-result: |
    Переход на страницу товара выполняется при клике на текст карточки товара.
    Текст невозможно выделить, так как вся карточка работает как ссылка.
    screenshot: assets/bugreports/image-bug-5.png.

- summary: |
    Поиск товаров работает только в пределах текущей страницы каталога
  environment: |
    Google Chrome 124.0.6344.93 (64-bit)
    Ubuntu 22.04 x86_64
    https://products-store.hexlet.app/
  steps-to-reproduce: |
    1. Открыть сайт магазина https://products-store.hexlet.app/
    2. Перейти на страницу каталога 2 через кнопку "Next"
    3. Ввести в поиск название товара, который есть на первой странице "Essence"
  expected-result: |
    Поиск выполняется по всему каталогу товаров.
    В результатах отображаются все подходящие товары, независимо от страницы пагинации.
  actual-result: |
    Поиск выполняется только по товарам на текущей странице пагинации.
    Товары с других страниц не отображаются.

- summary: |
    Фильтрация товаров работает только в пределах текущей страницы каталога
  environment: |
    Google Chrome 124.0.6344.93 (64-bit)
    Ubuntu 22.04 x86_64
    https://products-store.hexlet.app/
  steps-to-reproduce: |
    1. Открыть сайт магазина https://products-store.hexlet.app/
    2. Перейти на страницу каталога 2 через кнопку "Next"
    3. Выбрать категорию "beauty"
  expected-result: |
    Фильтр применяется ко всему каталогу.
    Отображаются все товары выбранной категории, независимо от страницы.
  actual-result: |
    Фильтр применяется только к текущей странице пагинации.
    Категория beauty не отображается.

- summary: |
    Фильтр по цене не учитывает цену со скидкой
  environment: |
    Google Chrome 124.0.6344.93 (64-bit)
    Ubuntu 22.04 x86_64
    https://products-store.hexlet.app/
  steps-to-reproduce: |
    1. Открыть сайт магазина https://products-store.hexlet.app/
    2. Установить фильтр цены "10" и "20"
    3. Проверить список товаров
  expected-result: |
    Фильтрация учитывает итоговую цену товара со скидкой.
    Товар "Dog Food" в диапазоне отображаются.
  actual-result: |
    Отображается товар  "Dog Food" с ценой 9.86$.
    screenshot: assets/bugreports/image-bug-8.png.
